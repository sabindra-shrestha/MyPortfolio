# ================================
# Application
# ================================
spring.application.name=portfolio
server.port=8080

# ================================
# Database - PostgreSQL (Local)
# ================================
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio_db
spring.datasource.username=portfolio_user
spring.datasource.password=portfolio_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / Hibernate
# ================================
# create-drop: creates tables on startup, drops on shutdown (dev only)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ================================
# Kafka
# ================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=portfolio-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ================================
# JWT
# ================================
app.jwt.secret=3d6f4a2b8c1e9f5a7d2b4c8e1f3a6d9b2c5e8f1a4d7b0c3e6f9a2d5b8c1e4f7
app.jwt.expiration=86400000