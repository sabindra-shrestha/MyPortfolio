<section class = "hero">
  <h1>I'm Here</h1>
  <p>Full-Stack Java Developer</p>
</section>

<section class = "featured-projects">
  <h2>Featured Projects</h2>

  <div *ngIf="loading">Loading projects...</div>
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <div +ngIf="!loading && !errorMessage" class="project-grid">
    <div *ngFor="let project of featuredProjects" class="project-card">
      <h3>{{ project.title }}</h3>
      <p>{{ project.description }}</p>
      <p class="tech-stack">{{ project.techStack }}</p>
      <a *ngIf="project.githubUrl" [href]="project.githubUrl" target="_blank">View on Github</a>
    </div>

    <div *ngIf="featuredProjects.length === 0">
      No featured projects yet — check back soon!
    </div>
  </div>

</section>
