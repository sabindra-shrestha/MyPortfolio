
<section class = "projects-page">
  <h2>All Projects</h2>

  <div *ngIf="loading">Loading projects...</div>
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <div +ngIf="!loading && !errorMessage" class="project-grid">
    <div *ngFor="let project of allProjects" class="project-card">
      <h3>{{ project.title }}</h3>
      <p>{{ project.description }}</p>
      <p class="tech-stack">{{ project.techStack }}</p>
      <div class="links">
        <a *ngIf="project.githubUrl" [href]="project.githubUrl" target="_blank">Github</a>
        <a *ngIf="project.liveUrl" [href]="project.liveUrl" target="_blank">Live Demo</a>
      </div>

    </div>

    <div *ngIf="allProjects.length === 0">
      No projects yet — check back soon!
    </div>
  </div>

</section>
